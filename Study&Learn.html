<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mizu Math | v17</title>
    <style>
        /* --- MIZU DARK THEME --- */
        :root {
            --bg: #0a0a0c;
            --surface: #16161a;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- BACKGROUND ENGINE --- */
        #star-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* --- TOP NAV (Gn Style) --- */
        nav {
            height: 60px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 20px; letter-spacing: -1px; color: var(--accent); }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { 
            color: var(--text-dim); text-decoration: none; font-size: 14px; font-weight: 600; cursor: pointer;
            padding: 8px 12px; border-radius: 8px; transition: 0.2s;
        }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-link.active { color: #fff; background: var(--accent); }

        /* --- MAIN VIEWPORT --- */
        main { flex: 1; position: relative; overflow: hidden; }
        .view { position: absolute; inset: 0; display: none; overflow-y: auto; padding: 20px; }
        .view.active { display: block; }

        /* --- GAME GRID (Mizu Style) --- */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px; max-width: 1000px; margin: 20px auto;
        }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 10px 25px var(--accent-glow); }
        .card .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .card .title { font-size: 14px; font-weight: 700; color: var(--text); }

        /* --- PROXY BROWSER UI --- */
        .browser-wrap { display: flex; flex-direction: column; height: 100%; gap: 10px; }
        .address-bar {
            display: flex; background: var(--surface); padding: 8px; border-radius: 12px; border: 1px solid var(--border); gap: 10px;
        }
        .address-bar input {
            flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px;
            color: #fff; padding: 10px 15px; outline: none; font-size: 15px;
        }
        .address-bar button {
            background: var(--accent); border: none; color: #fff; padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer;
        }
        .v-port { flex: 1; background: #fff; border-radius: 12px; overflow: hidden; position: relative; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; transform-origin: top left; }

        /* --- SETTINGS --- */
        .set-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 20px; max-width: 600px; margin: 0 auto 20px; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .res-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; cursor: pointer; }
        .res-btn.active { background: var(--accent); font-weight: 800; border-color: var(--accent); }

    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <nav>
        <div class="logo">MIZU<span style="color:#fff">MATH</span></div>
        <div class="nav-links">
            <div class="nav-link active" onclick="Core.tab('home')">Games</div>
            <div class="nav-link" onclick="Core.tab('browser')">Proxy</div>
            <div class="nav-link" onclick="Core.tab('settings')">Settings</div>
        </div>
    </nav>

    <main>
        <section id="home" class="view active">
            <div class="grid">
                <div class="card" onclick="Core.pop('https://www.youtube.com')">
                    <span class="icon">🎬</span><div class="title">YouTube</div>
                </div>
                <div class="card" onclick="Core.pop('https://www.tiktok.com')">
                    <span class="icon">🎵</span><div class="title">TikTok</div>
                </div>
                <div class="card" onclick="Core.pop('https://discord.com/app')">
                    <span class="icon">💬</span><div class="title">Discord</div>
                </div>
                <div class="card" onclick="Core.load('https://play2048.co/')">
                    <span class="icon">🔢</span><div class="title">2048</div>
                </div>
                <div class="card" onclick="Core.load('https://flappybird.io/')">
                    <span class="icon">🐦</span><div class="title">Flappy Bird</div>
                </div>
                <div class="card" onclick="Core.load('https://classic.minecraft.net')">
                    <span class="icon">⛏️</span><div class="title">Minecraft</div>
                </div>
            </div>
        </section>

        <section id="browser" class="view">
            <div class="browser-wrap">
                <div class="address-bar">
                    <input type="text" id="urlIn" placeholder="Search or type URL..." onkeypress="if(event.key==='Enter') Core.search()">
                    <button onclick="Core.search()">GO</button>
                    <button style="background:transparent; border:1px solid var(--accent); color:var(--accent);" onclick="Core.emergency()">↗</button>
                </div>
                <div class="v-port" id="vPort">
                    <iframe id="mainFrame" srcdoc="<body style='background:#0a0a0c; color:#94a3b8; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; font-family:sans-serif;'><h2>Proxy Engine Ready</h2></body>"></iframe>
                </div>
            </div>
        </section>

        <section id="settings" class="view">
            <div class="set-card">
                <h3>Resolution Override</h3>
                <p style="color:var(--text-dim); font-size: 13px; margin-top:5px;">Forces the browser to a specific pixel count. (Fixes blurry games)</p>
                <div class="res-grid">
                    <button class="res-btn active" onclick="Core.res('100%','100%',this)">Native</button>
                    <button class="res-btn" onclick="Core.res(1280, 720, this)">720p</button>
                    <button class="res-btn" onclick="Core.res(1920, 1080, this)">1080p</button>
                    <button class="res-btn" onclick="Core.res(3840, 2160, this)">4K</button>
                </div>
            </div>
            <div class="set-card">
                <h3>Tab Cloaking</h3>
                <button class="res-btn" style="width:100%" onclick="Core.cloak()">Cloak Tab (About:Blank)</button>
            </div>
            <div class="set-card" style="border-color:var(--danger)">
                <button class="res-btn" style="width:100%; background:var(--danger); border:none;" onclick="window.location.replace('https://classroom.google.com')">PANIC BUTTON</button>
            </div>
        </section>
    </main>

    <script>
        const Core = {
            tab: (id) => {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                // Highlight correct link
                const links = document.querySelectorAll('.nav-link');
                if(id === 'home') links[0].classList.add('active');
                if(id === 'browser') links[1].classList.add('active');
                if(id === 'settings') links[2].classList.add('active');
            },

            search: () => {
                let val = document.getElementById('urlIn').value.trim();
                if(!val) return;
                
                let target = "";
                if(val.includes('.') && !val.includes(' ')) {
                    target = val.startsWith('http') ? val : 'https://' + val;
                } else {
                    // Bing IGU bypass - most reliable for frames
                    target = 'https://www.bing.com/search?q=' + encodeURIComponent(val) + '&igu=1';
                }

                // If it's a known blocker site, don't even try the iframe
                const blocked = ['tiktok.com', 'youtube.com', 'discord.com', 'roblox.com'];
                if(blocked.some(s => target.toLowerCase().includes(s))) {
                    Core.pop(target);
                } else {
                    Core.load(target);
                }
            },

            load: (url) => {
                Core.tab('browser');
                const f = document.getElementById('mainFrame');
                f.removeAttribute('srcdoc');
                f.src = url;
            },

            pop: (url) => { window.open(url, '_blank'); },

            emergency: () => {
                let c = document.getElementById('mainFrame').src;
                if(c && !c.includes('srcdoc')) window.open(c, '_blank');
            },

            res: (w, h, btn) => {
                const f = document.getElementById('mainFrame'), v = document.getElementById('vPort');
                const old = f.src;
                document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if(w === '100%') {
                    f.style.width = '100%'; f.style.height = '100%'; f.style.transform = 'scale(1)';
                } else {
                    f.style.width = w + 'px'; f.style.height = h + 'px';
                    f.style.transform = `scale(${v.offsetWidth / w})`;
                }
                // Refresh fix for white screens
                f.src = "about:blank"; 
                setTimeout(() => { f.src = old; }, 50);
            },

            cloak: () => {
                const win = window.open();
                const url = window.location.href;
                const style = "margin:0; height:100vh; width:100vw; border:none;";
                win.document.body.innerHTML = `<iframe src="${url}" style="${style}"></iframe>`;
                win.document.title = "Google Docs"; // Tab name cloak
                window.location.replace('https://google.com'); // Original tab goes to safety
            }
        };

        // --- WARP SPEED STARS ---
        const canvas = document.getElementById('star-canvas'), ctx = canvas.getContext('2d');
        let stars = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<100; i++) stars.push({ x: Math.random()*canvas.width-canvas.width/2, y: Math.random()*canvas.height-canvas.height/2, z: Math.random()*canvas.width, pz: 0 });
        }
        function draw() {
            ctx.fillStyle = '#0a0a0c'; ctx.fillRect(0,0,canvas.width, canvas.height);
            let cx = canvas.width/2, cy = canvas.height/2;
            stars.forEach(s => {
                s.pz = s.z; s.z -= 5;
                if(s.z <= 0) { s.z = canvas.width; s.pz = s.z; }
                let x = s.x*(canvas.width/s.z)+cx, y = s.y*(canvas.width/s.z)+cy;
                let px = s.x*(canvas.width/s.pz)+cx, py = s.y*(canvas.width/s.pz)+cy;
                ctx.strokeStyle = `rgba(59, 130, 246, ${1-s.z/canvas.width})`;
                ctx.lineWidth = (canvas.width/s.z)*0.8; ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(x, y); ctx.stroke();
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', init); init(); draw();
    </script>
</body>
</html>
